services:

  ollama:
    image: ollama/ollama
    container_name: paperfinder-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama    # persist downloaded models
    networks:
      - paperfinder
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-init:
    image: ollama/ollama
    container_name: paperfinder-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull llama3 && echo 'Llama 3 model ready'"
    networks:
      - paperfinder
    restart: "no"   # run once only

  backend:
    build: ./backend
    container_name: paperfinder-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATA_DIR=/app/data
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - paperfinder

  frontend:
    build: ./frontend
    container_name: paperfinder-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - paperfinder

  startup-msg:
    image: alpine
    container_name: paperfinder-startup-msg
    command: >
      sh -c "echo '' &&
             echo '========================================' &&
             echo '  Paper Finder is running!' &&
             echo '  App:   http://localhost' &&
             echo '  Docs:  http://localhost:8000/docs' &&
             echo '  Note:  First run pulls Llama 3 (~4.7GB)' &&
             echo '========================================'  "
    depends_on:
      - frontend
      - backend
    networks:
      - paperfinder

networks:
  paperfinder:
    driver: bridge

volumes:
  ollama_models:    # named volume — persists Llama model across rebuilds